// ---- Undo / Redo ----
function canvasPushUndo() {
  const ds = canvasCurrentDate;
  if (!ds) return;
  canvasUndoStacks[ds] = canvasUndoStacks[ds] || [];
  canvasRedoStacks[ds] = canvasRedoStacks[ds] || [];
  const canvas = document.getElementById('drawing-canvas');
  canvasUndoStacks[ds].push(canvas.toDataURL());
  if (canvasUndoStacks[ds].length > MAX_UNDO) canvasUndoStacks[ds].shift();
  canvasRedoStacks[ds] = []; // new action clears redo
  updateUndoRedoBtns();
}

function canvasUndo() {
  const ds = canvasCurrentDate;
  if (!ds || !canvasUndoStacks[ds]?.length) return;
  canvasRedoStacks[ds] = canvasRedoStacks[ds] || [];
  const canvas = document.getElementById('drawing-canvas');
  canvasRedoStacks[ds].push(canvas.toDataURL());
  const prev = canvasUndoStacks[ds].pop();
  restoreCanvasSnapshot(prev);
}

function canvasRedo() {
  const ds = canvasCurrentDate;
  if (!ds || !canvasRedoStacks[ds]?.length) return;
  canvasUndoStacks[ds] = canvasUndoStacks[ds] || [];
  const canvas = document.getElementById('drawing-canvas');
  canvasUndoStacks[ds].push(canvas.toDataURL());
  const next = canvasRedoStacks[ds].pop();
  restoreCanvasSnapshot(next);
}

function restoreCanvasSnapshot(dataUrl) {
  const canvas = document.getElementById('drawing-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (dataUrl) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0);
      if (canvasCurrentDate) saveCanvasData(canvasCurrentDate);
      updateUndoRedoBtns();
    };
    img.src = dataUrl;
  } else {
    if (canvasCurrentDate) saveCanvasData(canvasCurrentDate);
    updateUndoRedoBtns();
  }
}

function updateUndoRedoBtns() {
  const ds = canvasCurrentDate;
  const undoBtn = document.getElementById('canvas-undo-btn');
  const redoBtn = document.getElementById('canvas-redo-btn');
  if (undoBtn) undoBtn.disabled = !(ds && canvasUndoStacks[ds]?.length);
  if (redoBtn) redoBtn.disabled = !(ds && canvasRedoStacks[ds]?.length);
}

function getPinchDistTouches(t1, t2) {
  const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

(function setupCanvasTouch() {
  const canvas = document.getElementById('drawing-canvas');

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function applyStroke(x1, y1, x2, y2) {
    const ctx = canvas.getContext('2d');
    ctx.save();
    if (currentTool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = currentEraserSize;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = Math.max(1, currentStroke);
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.restore();
  }

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      canvasDrawing = false;
      canvasPinchActive = true;
      canvasPinchStartDist = getPinchDistTouches(e.touches[0], e.touches[1]);
      canvasPinchStartZoom = canvasZoom;
      canvasPinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      canvasPinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      return;
    }
    e.preventDefault();
    canvasPinchActive = false;
    canvasPushUndo();
    canvasDrawing = true;
    const p = getPos(e);
    canvasLastX = p.x; canvasLastY = p.y;
  }, {passive: false});

  canvas.addEventListener('touchmove', e => {
    if (canvasPinchActive && e.touches.length === 2) {
      e.preventDefault();
      const dist = getPinchDistTouches(e.touches[0], e.touches[1]);
      const ratio = dist / canvasPinchStartDist;
      const newZoom = Math.min(4, Math.max(0.5, canvasPinchStartZoom * ratio));
      const rect = canvas.getBoundingClientRect();
      const midX = canvasPinchMidX - rect.left;
      const midY = canvasPinchMidY - rect.top;
      canvas.style.transformOrigin = `${midX}px ${midY}px`;
      canvas.style.transform = `scale(${newZoom})`;
      canvasZoom = newZoom;
      return;
    }
    if (!canvasDrawing || e.touches.length !== 1) return;
    e.preventDefault();
    const p = getPos(e);
    applyStroke(canvasLastX, canvasLastY, p.x, p.y);
    canvasLastX = p.x; canvasLastY = p.y;
  }, {passive: false});

  canvas.addEventListener('touchend', e => {
    if (canvasPinchActive) {
      canvasPinchActive = false;
      if (canvasCurrentDate) saveCanvasData(canvasCurrentDate);
      return;
    }
    canvasDrawing = false;
    if (canvasCurrentDate) saveCanvasData(canvasCurrentDate);
  }, {passive: true});

  // Mouse support
  canvas.addEventListener('mousedown', e => {
    canvasPushUndo();
    canvasDrawing = true;
    const rect = canvas.getBoundingClientRect();
    canvasLastX = e.clientX - rect.left;
    canvasLastY = e.clientY - rect.top;
  });
  canvas.addEventListener('mousemove', e => {
    if (!canvasDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    applyStroke(canvasLastX, canvasLastY, x, y);
    canvasLastX = x; canvasLastY = y;
  });
  canvas.addEventListener('mouseup', () => {
    canvasDrawing = false;
    if (canvasCurrentDate) saveCanvasData(canvasCurrentDate);
  });
  canvas.addEventListener('mouseleave', () => { canvasDrawing = false; });
})();

// ==================== VIEW TOGGLE ====================
(function() {
  const btn = document.getElementById('view-toggle-btn');
  const svgLines = `<svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="4.5" x2="14" y2="4.5"/><line x1="3" y1="8.5" x2="14" y2="8.5"/><line x1="3" y1="12.5" x2="14" y2="12.5"/></svg>`;
  const svgPencil = `<svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 3L14 6L6 14H3V11L11 3Z"/></svg>`;
  let lpTimer = null, lpFired = false;

  function startLP() {
    lpFired = false;
    lpTimer = setTimeout(() => {
      lpFired = true;
      if (viewMode === 'canvas') {
        document.body.classList.toggle('canvas-fullscreen');
      } else {
        switchToCanvas(true);
      }
    }, 500);
  }
  function cancelLP() { clearTimeout(lpTimer); }

  function doShortPress() {
    if (viewMode === 'text') { switchToCanvas(false); }
    else { switchToText(); }
  }

  btn.addEventListener('touchstart', () => startLP(), {passive: true});
  btn.addEventListener('touchmove', () => cancelLP(), {passive: true});
  btn.addEventListener('touchend', () => {
    cancelLP();
    if (!lpFired) doShortPress();
  }, {passive: true});
  btn.addEventListener('mousedown', () => startLP());
  btn.addEventListener('mousemove', () => cancelLP());
  btn.addEventListener('mouseup', () => { cancelLP(); if (!lpFired) doShortPress(); });

  function switchToCanvas(fullscreen) {
    viewMode = 'canvas';
    document.getElementById('swipe-container').style.display = 'none';
    document.getElementById('canvas-view').classList.add('active');
    btn.innerHTML = svgLines;
    if (fullscreen) document.body.classList.add('canvas-fullscreen');
    requestAnimationFrame(() => initCanvas(dateToStr(currentDate)));
  }

  function switchToText() {
    viewMode = 'text';
    document.getElementById('canvas-view').classList.remove('active');
    document.getElementById('swipe-container').style.display = '';
    document.body.classList.remove('canvas-fullscreen');
    btn.innerHTML = svgPencil;
  }

  // Initial icon: show pencil (= "tap to draw")
  btn.innerHTML = svgPencil;
})();

// ==================== PROFILE MODAL ====================
// Snapshot for cancel/revert
let _profSnap = {};
// Pending previews (applied live, committed on save)
let _pendTheme = null;
let _pendPill = null;
let _pendPillImg = null;
let _pendBg = null;

function openProfileModal() {
  // Save snapshot for cancel
  _profSnap = {
    theme: localStorage.getItem('profile_theme') || '#8B6F5E',
    pill:  localStorage.getItem('profile_pill')  || 'rgba(139,111,94,0.18)',
    pillImg: localStorage.getItem('profile_pill_img') || '',
    bg:    localStorage.getItem('profile_bg')    || '#FAF7F2',
  };
  _pendTheme = _profSnap.theme;
  _pendPill  = _profSnap.pill;
  _pendPillImg = _profSnap.pillImg;
  _pendBg    = _profSnap.bg;

  // Populate name
  const name = localStorage.getItem('profile_name') || '我的日程本';
  document.getElementById('profile-name-input').value = name;

  // Populate avatar
  const avatarUrl = localStorage.getItem('profile_avatar') || '';
  const avatarEl = document.getElementById('profile-avatar-btn');
  if (avatarUrl) {
    avatarEl.innerHTML = `<img src="${avatarUrl}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    avatarEl.innerHTML = '<span id="profile-avatar-icon">🙂</span>';
  }

  // Mark active pill swatch
  syncPillSwatches(_pendPill);
  // Mark active theme swatch
  syncThemeSwatches(_pendTheme);
  // Mark active bg swatch
  syncBgSwatches(_pendBg);

  // Load custom slots
  loadCustomSlots();

  document.getElementById('profile-title').textContent = lang === 'zh' ? '个人主页' : 'Profile';
  openModal('profile-modal');
}

// Called by pill long-press
function loadProfile() {
  openProfileModal();
}

function cancelProfile() {
  // Restore all CSS vars to snapshot
  document.documentElement.style.setProperty('--brown', _profSnap.theme || '#8B6F5E');
  document.documentElement.style.setProperty('--page-bg', _profSnap.bg || '#FAF7F2');
  const pill = document.getElementById('nav-pill');
  if (_profSnap.pillImg) {
    pill.style.backgroundImage = `url(${_profSnap.pillImg})`;
    pill.style.backgroundSize = 'cover';
    pill.style.backgroundPosition = 'center';
  } else {
    pill.style.backgroundImage = '';
    document.documentElement.style.setProperty('--pill-bg', _profSnap.pill || 'rgba(139,111,94,0.18)');
  }
  closeModal('profile-modal');
}

function saveProfile() {
  const name = document.getElementById('profile-name-input').value.trim() || '我的日程本';
  localStorage.setItem('profile_name', name);
  if (_pendTheme)   localStorage.setItem('profile_theme', _pendTheme);
  if (_pendPill)    localStorage.setItem('profile_pill', _pendPill);
  if (_pendBg)      localStorage.setItem('profile_bg', _pendBg);
  if (_pendPillImg) localStorage.setItem('profile_pill_img', _pendPillImg);
  else              localStorage.removeItem('profile_pill_img');
  closeModal('profile-modal');
  showToast(lang === 'zh' ? '已保存' : 'Saved');
}

// ---- Preview helpers ----
function setThemeColorPreview(color, el) {
  _pendTheme = color;
  document.documentElement.style.setProperty('--brown', color);
  syncThemeSwatches(color);
}

function syncThemeSwatches(color) {
  document.querySelectorAll('#theme-color-swatches .theme-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
  document.querySelectorAll('#theme-color-swatches .custom-slot').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color && s.classList.contains('filled'));
  });
}

function setPillColorPreview(el) {
  const color = el.dataset.color;
  if (!color) return;
  _pendPill = color;
  _pendPillImg = '';
  const pill = document.getElementById('nav-pill');
  pill.style.backgroundImage = '';
  document.documentElement.style.setProperty('--pill-bg', color);
  syncPillSwatches(color);
}

function syncPillSwatches(color) {
  document.querySelectorAll('#pill-color-swatches .theme-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
  document.querySelectorAll('#pill-color-swatches .custom-slot').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color && s.classList.contains('filled'));
  });
}

function setBgColorPreview(color, el) {
  _pendBg = color;
  document.documentElement.style.setProperty('--page-bg', color);
  syncBgSwatches(color);
}

function syncBgSwatches(color) {
  document.querySelectorAll('#bg-color-swatches .bg-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.bg === color);
  });
}

// ---- Custom color slots ----
function loadCustomSlots() {
  for (let i = 0; i < 2; i++) {
    const pc = localStorage.getItem(`profile_pill_custom_${i}`) || '';
    updateCustomSlotUI('pill', i, pc);
    const tc = localStorage.getItem(`profile_theme_custom_${i}`) || '';
    updateCustomSlotUI('theme', i, tc);
  }
  // Bind long-press to clear
  for (let i = 0; i < 2; i++) {
    const ps = document.getElementById(`pill-custom-${i}`);
    const ts = document.getElementById(`theme-custom-${i}`);
    if (ps) bindLongPress(ps, () => {
      if (!ps.classList.contains('filled')) return;
      localStorage.removeItem(`profile_pill_custom_${i}`);
      updateCustomSlotUI('pill', i, '');
      showToast('已清除');
    });
    if (ts) bindLongPress(ts, () => {
      if (!ts.classList.contains('filled')) return;
      localStorage.removeItem(`profile_theme_custom_${i}`);
      updateCustomSlotUI('theme', i, '');
      showToast('已清除');
    });
  }
}

function updateCustomSlotUI(type, slot, color) {
  const el = document.getElementById(`${type}-custom-${slot}`);
  if (!el) return;
  if (color) {
    el.dataset.color = color;
    el.classList.add('filled');
    el.style.background = color;
    el.textContent = '';
    el.title = '点击应用 · 长按清除';
    el.onclick = type === 'pill'
      ? () => setPillColorPreview(el)
      : () => setThemeColorPreview(color, el);
  } else {
    el.dataset.color = '';
    el.classList.remove('filled');
    el.classList.remove('active');
    el.style.background = '';
    el.textContent = '+';
    el.title = '点击保存当前颜色';
    el.onclick = type === 'pill'
      ? () => saveCustomPillSlot(slot)
      : () => saveCustomThemeSlot(slot);
  }
}

function saveCustomPillSlot(slot) {
  const color = _pendPill || localStorage.getItem('profile_pill') || 'rgba(139,111,94,0.18)';
  localStorage.setItem(`profile_pill_custom_${slot}`, color);
  updateCustomSlotUI('pill', slot, color);
}

function saveCustomThemeSlot(slot) {
  const color = _pendTheme || localStorage.getItem('profile_theme') || '#8B6F5E';
  localStorage.setItem(`profile_theme_custom_${slot}`, color);
  updateCustomSlotUI('theme', slot, color);
}

// ---- Avatar / Pill image ----
function handleAvatarChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    localStorage.setItem('profile_avatar', url);
    const avatarEl = document.getElementById('profile-avatar-btn');
    avatarEl.innerHTML = `<img src="${url}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  };
  reader.readAsDataURL(file);
}

function handlePillImgChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const url = e.target.result;
    _pendPillImg = url;
    _pendPill = '';
    const pill = document.getElementById('nav-pill');
    pill.style.backgroundImage = `url(${url})`;
    pill.style.backgroundSize = 'cover';
    pill.style.backgroundPosition = 'center';
    // Deselect all pill swatches
    document.querySelectorAll('#pill-color-swatches .theme-swatch, #pill-color-swatches .custom-slot').forEach(s => s.classList.remove('active'));
  };
  reader.readAsDataURL(file);
}

// ==================== INIT ====================
computePageRowCount();
window.addEventListener('resize', computePageRowCount);
processOverdueItems();
// Apply saved profile preferences (theme/pill/bg colors) without opening modal
(function applyProfile() {
  const savedTheme = localStorage.getItem('profile_theme') || '#8B6F5E';
  document.documentElement.style.setProperty('--brown', savedTheme);
  const savedBg = localStorage.getItem('profile_bg') || '#FAF7F2';
  document.documentElement.style.setProperty('--page-bg', savedBg);
  const savedPillImg = localStorage.getItem('profile_pill_img');
  const savedPill = localStorage.getItem('profile_pill') || 'rgba(139,111,94,0.18)';
  const pill = document.getElementById('nav-pill');
  if (savedPillImg) {
    pill.style.backgroundImage = `url(${savedPillImg})`;
    pill.style.backgroundSize = 'cover';
    pill.style.backgroundPosition = 'center';
  } else {
    document.documentElement.style.setProperty('--pill-bg', savedPill);
  }
})();
renderAll();

document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

// Keyboard shortcut: left/right arrow to navigate days
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') navigateDay(-1);
  if (e.key === 'ArrowRight') navigateDay(1);
});
</script>
